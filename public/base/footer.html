<!-- Footer dynamic path script -->
<script>
  (function() {
    const isRoot = window.location.pathname === '/' || window.location.pathname.endsWith('index.html');
    const basePath = isRoot ? '' : '../';

    // Footer logo
    const footerLogo = document.getElementById('site-footer-logo');
    if (footerLogo) footerLogo.src = basePath + '/assets/logoBlackHorizontal.png';

    // Footer links
    const footerLinks = {
      'terms-link': 'pages/terms.html',
      'privacy-link': 'pages/privacy.html'
    };
    for (const [id, path] of Object.entries(footerLinks)) {
      const el = document.getElementById(id);
      if (el) el.href = basePath + path;
    }
  })();
</script>
